version: '3.8'

x-common-config: &common-config
  restart: unless-stopped
  networks:
    - gas-monitoring

services:
  postgres:
    image: postgres:15-alpine
    container_name: gas-monitor-postgres
    <<: *common-config
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gas_monitoring}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/postgresql_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    container_name: gas-monitor-influxdb
    <<: *common-config
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD:-admin123}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-gas-monitoring}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-sensor_data}
      DOCKER_INFLUXDB_INIT_RETENTION: ${INFLUXDB_RETENTION:-7d}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-gas-monitoring-secret-token}
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - ./influxdb/config:/etc/influxdb2
      - ./influxdb/scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2.0-openssl
    container_name: gas-monitor-mosquitto
    <<: *common-config
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - ./mosquitto/config/passwd:/mosquitto/config/passwd:ro
    environment:
      - MOSQUITTO_USERNAME=${MQTT_USER:-admin}
      - MOSQUITTO_PASSWORD=${MQTT_PASSWORD:-admin123}
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -p 1883 -u ${MQTT_USER:-admin} -P ${MQTT_PASSWORD:-admin123} -t 'health/check' -m 'ping' -q 2 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: gas-monitor-prometheus
    <<: *common-config
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gas-monitor-backend
    <<: *common-config
    environment:
      - GIN_MODE=${GIN_MODE:-release}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-gas_monitoring}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres123}
      - INFLUXDB_HOST=influxdb
      - INFLUXDB_PORT=8086
      - INFLUXDB_ORG=${INFLUXDB_ORG:-gas-monitoring}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-sensor_data}
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-gas-monitoring-secret-token}
      - MQTT_BROKER=tcp://mosquitto:1883
      - MQTT_USER=${MQTT_USER:-admin}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-admin123}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
    ports:
      - "8080:8080"
      - "6060:6060"
    volumes:
      - ./backend/config:/app/config:ro
      - ./frontend:/app/frontend:ro
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: gas-monitor-simulator
    <<: *common-config
    environment:
      - MQTT_BROKER=tcp://mosquitto:1883
      - MQTT_USER=${MQTT_USER:-admin}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-admin123}
      - SIMULATOR_DETECTORS=300
      - SIMULATOR_INTERVAL=1000
      - SIMULATOR_CORRIDOR_LENGTH=30000
      - SIMULATOR_LEAK_ENABLED=false
      - SIMULATOR_LEAK_POSITION=15000
      - SIMULATOR_LEAK_RATE=1.0
      - SIMULATOR_WIND_SPEED=1.5
      - SIMULATOR_WIND_DIR=90.0
    depends_on:
      mosquitto:
        condition: service_healthy
    profiles:
      - simulator

volumes:
  postgres-data:
    driver: local
  influxdb-data:
    driver: local
  prometheus-data:
    driver: local

networks:
  gas-monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
